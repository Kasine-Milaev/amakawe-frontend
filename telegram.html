<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Amakawe — Telegram Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: var(--tg-bg-color, #0f0f1e);
      color: var(--tg-text-color, #fff);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      padding: 16px;
      text-align: center;
    }
    .user-info {
      background: rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 12px;
      margin: 16px 0;
    }
    .btn {
      background: var(--tg-button-color, #667eea);
      color: var(--tg-button-text-color, #fff);
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      margin: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎌 Amakawe</h1>
    
    <div class="user-info" id="userInfo">
      Загрузка...
    </div>
    
    <button class="btn" onclick="closeApp()">Закрыть</button>
    <button class="btn" onclick="sendData()">Отправить данные</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp
    const userInfo = document.getElementById('userInfo')
    if (tg.initDataUnsafe?.user) {
      const user = tg.initDataUnsafe.user
      userInfo.innerHTML = `
        <strong>${user.first_name} ${user.last_name || ''}</strong><br>
        @${user.username || 'нет юзернейма'}<br>
        ${user.is_premium ? '⭐ Premium' : ''}
      `
    } else {
      userInfo.textContent = 'Запущено вне Telegram'
    }

    tg.ready()
    tg.expand()

    function closeApp() {
      tg.close()
    }
    
    function sendData() {
      tg.sendData(JSON.stringify({ action: 'test', timestamp: Date.now() }))
    }
    if (tg.themeParams) {
      document.documentElement.style.setProperty('--tg-bg-color', tg.themeParams.bg_color)
      document.documentElement.style.setProperty('--tg-text-color', tg.themeParams.text_color)
      document.documentElement.style.setProperty('--tg-button-color', tg.themeParams.button_color)
      document.documentElement.style.setProperty('--tg-button-text-color', tg.themeParams.button_text_color)
    }
  </script>
</body>
</html>
